<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Message Sent - GCTU StudentHostels</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #fefcf5 0%, #f8f3e9 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .thankyou-card {
            background: white;
            padding: 60px 40px;
            border-radius: 48px;
            text-align: center;
            max-width: 500px;
            margin: 20px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
        }

        .thankyou-card h1 {
            color: #1faa7d;
            margin-bottom: 20px;
            font-size: 2.5rem;
        }

        .thankyou-card p {
            color: #5a6e65;
            margin-bottom: 30px;
            font-size: 1.1rem;
        }

        .btn {
            background: #1faa7d;
            color: white;
            padding: 12px 30px;
            border-radius: 40px;
            text-decoration: none;
        }

        .btn:hover {
            background: #158a62;
        }
    </style>
</head>

<body>
    <div class="thankyou-card">
        <div style="font-size: 64px;">📧✅</div>
        <h1>Message Sent!</h1>
        <p>Thank you for contacting us. We'll get back to you within 24 hours.</p>
        <a href="index.html" class="btn">Back to Home</a>
    </div>
</body>


</html>
