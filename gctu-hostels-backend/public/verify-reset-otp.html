<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify Code | GCTU StudentHostels</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div id="app">
        <div class="glass-panel">
            <div class="text-center">
                <i class="fas fa-envelope"></i>
                <h2>Verify Your Email</h2>
                <p class="underHeader">Enter the 6-digit code sent to</p>
                <p class="email-display" id="emailDisplay">your@email.com</p>
            </div>

            <form id="verifyOtpForm">
                <div class="form-group">
                    <i class="fas fa-code input-icon"></i>
                    <input type="text" id="otpCode" placeholder="_ _ _ _ _ _" class="form-input otp-input" required
                        maxlength="6">
                </div>

                <div class="timer-display" id="timerDisplay">Time remaining: 10:00</div>

                <button type="submit" class="btn-primary" id="verifyBtn">
                    <i class="fas fa-check-circle"></i>
                    Verify Code
                </button>
                <p id="error-message" class="error-message"></p>
            </form>

            <div class="text-center">
                <p class="underHead">
                    <a href="forgot-password.html" class="link-button">← Back</a>
                </p>
            </div>
        </div>
    </div>

    <script src="verify-reset-otp.js"></script>
</body>

</html>
