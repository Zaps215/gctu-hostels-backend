<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password | GCTU StudentHostels</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div id="app">
        <div class="glass-panel">
            <div class="text-center">
                <i class="fas fa-key" style="font-size: 3rem; color: #f59e0b; margin-bottom: 0.75rem;"></i>
                <h2>Forgot Password</h2>
                <p class="underHeader">Enter your email to reset your password</p>
            </div>

            <form id="forgotPasswordForm">
                <div class="form-group">
                    <i class="fas fa-envelope input-icon"></i>
                    <input type="email" id="email" placeholder="Email address" class="form-input" required>
                </div>

                <button type="submit" class="btn-primary">
                    <i class="fas fa-paper-plane"></i>
                    Send Reset Code
                </button>
                <p id="error-message" class="error-message"></p>
            </form>

            <div class="text-center">
                <p class="underHead">
                    <a href="login.html" class="link-button">Back to Login</a>
                </p>
            </div>
        </div>
    </div>

    <script src="forgot-password.js"></script>
</body>

</html>
