<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="style.css">

</head>

<body>
    <div id="app">
        <!--Login form-->
        <div id="LoginContainer" class="glass-panel">
            <div class="text-center">
                <i class="fas fa-laptop-code" style="font-size: 3rem; color: #f97316; margin-bottom: 0.75rem;"></i>
                <h2 id="header">Welcome Back</h2>
                <p class="underHeader">Sign in to your account</p>
            </div>


            <div id="loginError" class="error-message hidden"></div>

            <form id="loginForm">
                <div class="form-group">
                    <i class="fas fa-user input-icon"></i>
                    <input type="text" name="username" id="Username" placeholder="Username" class="form-input" required>

                </div>

                <div class="form-group">
                    <i class="fas fa-lock input-icon"></i>
                    <input type="password" name="password" id="password" placeholder="Password" class="form-input"
                        required>
                    <i class="fa-solid fa-eye" id="togglePassword"></i>
                </div>

                <button type="submit" class="btn-primary" id="LoginBtn" value="Submit">
                    <i class="fas fa-arrow-right-to-bracket"></i>
                    Login
                </button>
                <p id="error-message">

                </p>
                <div class="text-center">
                    <p class="underHead">
                        <a href="forgot-password.html" class="link-button">Forgot Password?</a>
                    </p>
                </div>
            </form>
            <div class="text-center">
                <p class="underHead">Don't have an account?
                    <a href="signup.html" id="showSignupFromSignupBtn" class="link-button">Register</a>

                </p>
            </div>
        </div>
    </div>
    <!-- Custom Popup for Login -->
    <div id="loginPopup" class="custom-popup">
        <div class="popup-content">
            <div class="popup-icon">✅</div>
            <h3>Login Successful</h3>
            <p id="popupMessage">Welcome back! Redirecting to homepage...</p>
            <button class="popup-ok-btn" id="popupOkBtn">OK</button>
        </div>
    </div>

    <script src="login.js"></script>

</body>

</html>
